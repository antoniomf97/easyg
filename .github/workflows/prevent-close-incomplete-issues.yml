name: Prevent Closing Incomplete Issues
on:
  issues:
    types: [edited, closed]

jobs:
  prevent_close:
    runs-on: ubuntu-latest
    steps:
      - name: Check for incomplete tasks
        uses: actions/github-script@v6
        with:
          script: |
            const issueBody = context.payload.issue.body;
            const incomplete = issueBody.match(/- \[ \]/g);
            if (incomplete && context.payload.action === 'closed') {
              throw new Error('Cannot close issue: tasks are not complete');
            }
