name: Prevent Closing Incomplete Issues

on:
  issues:
    types: [closed]

jobs:
  check-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Check if all tasks are done
        uses: actions/github-script@v6
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";
            const incompleteTasks = body.match(/- \[ \]/g) || [];

            if (incompleteTasks.length > 0) {
              // Reopen the issue if it was closed
              await github.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "open"
              });
              
              // Add a comment explaining why
              await github.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: "⚠️ Cannot close issue: there are incomplete tasks remaining."
              });

              console.log("Issue reopened because tasks are incomplete.");
            } else {
              console.log("All tasks completed. Issue can stay closed.");
            }
